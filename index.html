<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数独 · Sudoku</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Subtle background texture overlay -->
  <div class="bg-texture"></div>

  <div id="app">
    <!-- Header -->
    <header id="header">
      <div class="brand">
        <div class="logo">九宫</div>
        <h1>数独</h1>
      </div>
      <div class="header-controls">
        <div class="select-group">
          <label for="size-select">棋盘</label>
          <select id="size-select">
            <option value="4">4 × 4</option>
            <option value="6">6 × 6</option>
            <option value="9" selected>9 × 9</option>
            <option value="16">16 × 16</option>
          </select>
        </div>
        <div class="select-group">
          <label for="difficulty-select">难度</label>
          <select id="difficulty-select">
            <option value="easy">简单</option>
            <option value="medium" selected>中等</option>
            <option value="hard">困难</option>
          </select>
        </div>
        <button id="btn-new-game" class="btn btn-primary">新游戏</button>
      </div>
    </header>

    <!-- Stats -->
    <div id="stats-bar">
      <div class="stat">
        <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span id="timer">00:00</span>
      </div>
      <div class="stat">
        <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        <span id="error-count">0</span>
      </div>
      <div class="stat">
        <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        <span id="move-count">0</span>
      </div>
    </div>

    <!-- Board -->
    <div id="board-wrapper">
      <div id="board-container">
        <div id="sudoku-board"></div>
      </div>
    </div>

    <!-- Number Pad -->
    <div id="number-pad"></div>

    <!-- Game Actions -->
    <div id="action-bar">
      <button id="btn-undo" class="btn btn-icon" title="撤销">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
        <span>撤销</span>
      </button>
      <button id="btn-redo" class="btn btn-icon" title="重做">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.13-9.36L23 10"/></svg>
        <span>重做</span>
      </button>
      <div class="action-divider"></div>
      <button id="notes-toggle" class="btn btn-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        <span>笔记</span>
      </button>
      <button id="btn-hint" class="btn btn-icon" title="提示">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M15.09 14c.18-.98.65-1.74 1.41-2.5A4.65 4.65 0 0 0 18 8 6 6 0 0 0 6 8c0 1 .23 2.23 1.5 3.5A4.61 4.61 0 0 1 8.91 14"/></svg>
        <span>提示</span>
      </button>
      <button id="btn-check" class="btn btn-icon" title="检查">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
        <span>检查</span>
      </button>
      <button id="btn-show-solution" class="btn btn-icon btn-warn" title="答案">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        <span>答案</span>
      </button>
    </div>

    <!-- Tool Bar -->
    <div id="tool-bar">
      <div class="tool-group">
        <button id="btn-save" class="btn btn-sm">保存进度</button>
        <button id="btn-load" class="btn btn-sm">加载进度</button>
        <button id="btn-export" class="btn btn-sm">导出存档</button>
        <button id="btn-import" class="btn btn-sm">导入存档</button>
        <input type="file" id="import-file" accept=".json" style="display:none">
      </div>
      <div class="tool-divider"></div>
      <div class="tool-group">
        <button id="btn-share-link" class="btn btn-sm">分享链接</button>
        <button id="btn-share-code" class="btn btn-sm">复制题目码</button>
        <button id="btn-import-code" class="btn btn-sm">导入题目码</button>
      </div>
      <div class="tool-divider"></div>
      <button id="btn-history" class="btn btn-sm">历史记录</button>
    </div>

    <!-- Notification -->
    <div id="notification"></div>

    <!-- Result Overlay -->
    <div id="result-panel" class="overlay-panel" style="display:none">
      <div class="panel-backdrop"></div>
      <div class="panel-card">
        <div class="panel-icon">&#9670;</div>
        <h2>恭喜完成</h2>
        <div id="result-content"></div>
        <div class="panel-actions">
          <button id="result-share-btn" class="btn btn-primary">分享题目</button>
          <button id="result-close" class="btn btn-ghost">关闭</button>
        </div>
      </div>
    </div>

    <!-- History Overlay -->
    <div id="history-panel" class="overlay-panel" style="display:none">
      <div class="panel-backdrop"></div>
      <div class="panel-card panel-wide">
        <h2>历史记录</h2>
        <div id="history-content"></div>
        <div class="panel-actions">
          <button id="history-clear" class="btn btn-warn">清空记录</button>
          <button id="history-close" class="btn btn-ghost">关闭</button>
        </div>
      </div>
    </div>

    <!-- Modal -->
    <div id="modal-overlay" class="overlay-panel" style="display:none">
      <div class="panel-backdrop"></div>
      <div class="panel-card">
        <h2 id="modal-title"></h2>
        <div id="modal-body"></div>
        <input type="text" id="modal-input" style="display:none" placeholder="请输入...">
        <div class="panel-actions">
          <button id="modal-confirm" class="btn btn-primary">确定</button>
          <button id="modal-cancel" class="btn btn-ghost">取消</button>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer id="footer">
      <p>方向键导航 · 数字/字母输入 · <kbd>N</kbd> 切换笔记 · <kbd>Ctrl+Z</kbd> 撤销</p>
    </footer>
  </div>

  <script src="js/sudokuSolver.js"></script>
  <script src="js/sudokuGenerator.js"></script>
  <script src="js/gameState.js"></script>
  <script src="js/storageManager.js"></script>
  <script src="js/shareManager.js"></script>
  <script src="js/uiController.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
